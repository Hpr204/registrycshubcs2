<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | CS2 HUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 32px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ffd700;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
        }

        .message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
            padding: 10px;
            border-radius: 10px;
        }

        .success {
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
        }

        .error {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .link-home {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        .link-home a {
            color: #ffd700;
            text-decoration: none;
            font-size: 15px;
            transition: opacity 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .link-home a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .password-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>Регистрация на CS2 HUB</h1>
        
        <form id="registerForm">
            <div class="input-group">
                <label>Имя пользователя</label>
                <input type="text" id="username" placeholder="От 3 символов" required>
            </div>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Минимум 6 символов" required>
                <div class="password-hint">Минимум 6 символов</div>
            </div>
            
            <button type="submit">Зарегистрироваться</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="link-home">
            <!-- 👇 ИСПРАВЛЕННАЯ ССЫЛКА НА ГЛАВНУЮ -->
            <a href="https://hpr204.github.io/-/">
                <i class="fas fa-arrow-left"></i> Вернуться на главную
            </a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 🔥 ВСТАВЬТЕ СВОЙ КОНФИГ ИЗ FIREBASE (ТОТ ЖЕ, ЧТО И НА ГЛАВНОЙ)
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "ВАШ_AUTH_DOMAIN",
            projectId: "ВАШ_PROJECT_ID",
            storageBucket: "ВАШ_STORAGE_BUCKET",
            messagingSenderId: "ВАШ_MESSAGING_SENDER_ID",
            appId: "ВАШ_APP_ID"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const messageDiv = document.getElementById('message');

            // Очищаем предыдущие сообщения
            messageDiv.className = 'message';
            messageDiv.textContent = '';

            // Валидация
            if (username.length < 3) {
                messageDiv.innerHTML = '❌ Имя должно быть не меньше 3 символов';
                messageDiv.classList.add('error');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                messageDiv.innerHTML = '❌ Введите корректный email';
                messageDiv.classList.add('error');
                return;
            }

            if (password.length < 6) {
                messageDiv.innerHTML = '❌ Пароль должен быть не меньше 6 символов';
                messageDiv.classList.add('error');
                return;
            }

            try {
                // Проверяем, не занят ли email
                const existingUser = await db.collection('users')
                    .where('email', '==', email)
                    .get();
                
                if (!existingUser.empty) {
                    messageDiv.innerHTML = '❌ Пользователь с таким email уже существует';
                    messageDiv.classList.add('error');
                    return;
                }

                // Сохраняем в Firebase
                await db.collection('users').add({
                    username: username,
                    email: email,
                    registeredAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                messageDiv.innerHTML = '✅ Регистрация успешна! Перенаправляем...';
                messageDiv.classList.add('success');
                
                // Сохраняем имя пользователя в localStorage
                localStorage.setItem('cs2hub_user', username);
                
                // Очищаем форму
                document.getElementById('registerForm').reset();
                
                // Перенаправляем на главную через 2 секунды
                setTimeout(() => {
                    // 👇 ИСПРАВЛЕННАЯ ССЫЛКА ПРИ ПЕРЕНАПРАВЛЕНИИ
                    window.location.href = 'https://hpr204.github.io/-/';
                }, 2000);
                
            } catch (error) {
                messageDiv.innerHTML = '❌ Ошибка: ' + error.message;
                messageDiv.classList.add('error');
            }
        });
    </script>
</body>
</html>
